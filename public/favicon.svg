<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C97A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4A853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8902F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1729;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c1222;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="4"/>
  
  <!-- Crescent Moon -->
  <path d="M160 100 
    C 100 140, 80 240, 140 320 
    C 170 360, 200 360, 200 360
    C 150 340, 120 280, 120 220 
    C 120 160, 140 120, 160 100 Z" 
    fill="url(#goldGrad)" filter="url(#glow)" opacity="0.95"/>
  
  <!-- Star -->
  <polygon points="310,95 325,145 378,145 335,178 350,228 310,198 270,228 285,178 242,145 295,145" 
    fill="url(#goldGrad)" filter="url(#glow)"/>
  
  <!-- Chalet Roof -->
  <path d="M145 310 L256 230 L367 310" 
    fill="none" stroke="url(#goldGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Chalet Body -->
  <rect x="170" y="310" width="172" height="100" rx="4" 
    fill="none" stroke="url(#goldGrad)" stroke-width="8"/>
  
  <!-- Chalet Door -->
  <path d="M235 410 L235 345 Q256 330 277 345 L277 410" 
    fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Small Windows -->
  <rect x="185" y="330" width="28" height="28" rx="4" 
    fill="none" stroke="url(#goldGrad)" stroke-width="5" opacity="0.8"/>
  <rect x="299" y="330" width="28" height="28" rx="4" 
    fill="none" stroke="url(#goldGrad)" stroke-width="5" opacity="0.8"/>
  
  <!-- Decorative dots on roof -->
  <circle cx="210" cy="290" r="3" fill="url(#goldGrad)" opacity="0.6"/>
  <circle cx="256" cy="265" r="3" fill="url(#goldGrad)" opacity="0.6"/>
  <circle cx="302" cy="290" r="3" fill="url(#goldGrad)" opacity="0.6"/>
</svg>
